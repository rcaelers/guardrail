volumes:
  surrealdb-storage:
  minio-storage:
  valkey-storage:
  pocket-id-storage:
  rauthy-data:
  caddy-data:
  caddy-config:
  svelte-node-modules:
  svelte-kit:

x-rust-build-args: &rust-build-args
  CARGO_BUILD_FLAGS: ${GUARDRAIL_CARGO_BUILD_FLAGS:-}
  CARGO_BUILD_OUTPUT_DIR: ${GUARDRAIL_CARGO_BUILD_OUTPUT_DIR:-debug}
  CARGO_BUILD_RUSTFLAGS: ${GUARDRAIL_CARGO_BUILD_RUSTFLAGS:-}

services:
  valkey:
    container_name: valkey
    image: valkey/valkey:latest
    ports:
      - 6379:6379
    volumes:
      - valkey-storage:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  surrealdb:
    container_name: surrealdb
    image: surrealdb/surrealdb:latest
    user: '0:0'
    ports:
      - 8000:8000
    volumes:
      - surrealdb-storage:/data
    command: start --user root --pass root rocksdb:/data/srdb.db
    restart: unless-stopped
    healthcheck:
      test: ['CMD', '/surreal', 'is-ready']
      interval: 10s
      timeout: 5s
      retries: 5

  schema-sync:
    container_name: schema-sync
    build:
      context: ..
      dockerfile: Containerfile
      target: schema-sync
      provenance: false
      sbom: false
    depends_on:
      surrealdb:
        condition: service_healthy
    environment:
      DATABASE_HOST: ws://surrealdb:8000
      DATABASE_NAMESPACE: guardrail
      DATABASE_NAME: guardrail
      DATABASE_USER: root
      DATABASE_PASSWORD: root
    command:
      - sh
      - -c
      - surrealkit setup && surrealkit sync --fail-fast
    restart: 'no'

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - '9000:9000' # S3 API port
      - '9001:9001' # Console port
    volumes:
      - minio-storage:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server --console-address ":9001" /data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-setup:
    image: minio/mc
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio-setup.sh:/minio-setup.sh:ro
    entrypoint: ['/bin/sh', '-c', '/bin/sh /minio-setup.sh']
    restart: 'no'

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: pocket-id
    environment:
      APP_URL: https://guardrail.home.krandor.org:1443
      ENCRYPTION_KEY: GuardrailPocketIdDevEncryptionKey0123456789
      STATIC_API_KEY: GuardrailPocketIdStaticApiKey0123456789
      TRUST_PROXY: 'true'
      UI_CONFIG_DISABLED: 'true'
      ALLOW_USER_SIGNUPS: withToken
    volumes:
      - pocket-id-storage:/app/data
    healthcheck:
      test: ['CMD', '/app/pocket-id', 'healthcheck']
      interval: 90s
      timeout: 5s
      retries: 2
      start_period: 10s
    restart: unless-stopped

  rauthy:
    image: ghcr.io/sebadob/rauthy:v0.35.2
    container_name: rauthy
    environment:
      LISTEN_SCHEME: http
      PUB_URL: "guardrail.home.krandor.org:2443"
      PROXY_MODE: "true"
      TRUSTED_PROXIES: "172.0.0.0/8"
      RP_ID: "guardrail.home.krandor.org"
      RP_ORIGIN: "https://guardrail.home.krandor.org:2443"
      HQL_NODE_ID: "1"
      HQL_NODES: "1 127.0.0.1:8100 127.0.0.1:8200"
      HQL_SECRET_RAFT: "GuardrailRauthyRaftSecret1234567"
      HQL_SECRET_API: "GuardrailRauthyApiSecret12345678"
      ENC_KEYS: "devkey/lGXvpx00uJJVb+Uo3S0epNwKVTQZaqXgshTMbE2A+Ns="
      ENC_KEY_ACTIVE: "devkey"
      BOOTSTRAP_ADMIN_EMAIL: "admin@localhost"
      BOOTSTRAP_ADMIN_PASSWORD_PLAIN: "RauthyDevAdmin123!"
      BOOTSTRAP_API_KEY: ""
      BOOTSTRAP_API_KEY_SECRET: "GuardrailRauthyDevApiKeySecret0123456789abcdefghijklmnopqrstuvwx"
      BOOTSTRAP_DIR: "bootstrap"
    volumes:
      - rauthy-data:/app/data
      - ./rauthy-bootstrap:/app/data/bootstrap:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1:8080/auth/v1/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: caddy
    depends_on:
      pocket-id:
        condition: service_healthy
      rauthy:
        condition: service_healthy
      guardrail:
        condition: service_healthy
      svelte:
        condition: service_started
    ports:
      - '1443:1443'
      - '2443:2443'
      - '4433:4433'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./_private/certs/guardrail.home.krandor.org.crt:/certs/guardrail.home.krandor.org.crt:ro
      - ./_private/certs/guardrail.home.krandor.org.key:/certs/guardrail.home.krandor.org.key:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  guardrail:
    container_name: guardrail
    build:
      context: ..
      dockerfile: Containerfile
      target: server
      args: *rust-build-args
      provenance: false
      sbom: false
    command: ['/app/guardrail', 'all', '-C', '/config']
    depends_on:
      surrealdb:
        condition: service_healthy
      schema-sync:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      RUST_LOG: info
    volumes:
      - ../config/scripts:/config/scripts:ro
      - ./config/settings.yaml:/config/settings.yaml:ro
      # Mount ONE of the following OIDC+provisioner configs:
      - ./config/web-docker.yaml:/config/web-docker.yaml:ro   # PocketID (default)
      # - ./config/web-rauthy.yaml:/config/web-rauthy.yaml:ro  # Rauthy (experimental)
      - /tmp/guardrail
    ports:
      - '8080:80'
      - '8081:81'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1:80/api/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  svelte:
    container_name: svelte
    build:
      context: ..
      dockerfile: Containerfile.ui
      target: dev
      provenance: false
      sbom: false
    environment:
      PORT: '3000'
      HOST: '0.0.0.0'
      ORIGIN: 'https://guardrail.home.krandor.org:4433'
      GUARDRAIL_API_URL: 'http://guardrail:8082/api/v1'
      # Vite uses Chokidar for file watching. Polling makes host bind-mount
      # changes reliable on Docker Desktop filesystems.
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - ../src/web/ui:/app
      - svelte-node-modules:/app/node_modules
      - svelte-kit:/app/.svelte-kit
    restart: unless-stopped

  pocket-id-setup:
    image: alpine:3.22
    container_name: pocket-id-setup
    depends_on:
      pocket-id:
        condition: service_healthy
    environment:
      POCKET_ID_URL: http://pocket-id:1411
      POCKET_ID_PUBLIC_URL: https://guardrail.home.krandor.org:1443
      POCKET_ID_API_KEY: GuardrailPocketIdStaticApiKey0123456789
      POCKET_ID_ADMIN_USERNAME: admin
      POCKET_ID_ADMIN_EMAIL: admin@localhost
      POCKET_ID_ADMIN_FIRST_NAME: Guardrail
      POCKET_ID_ADMIN_LAST_NAME: Admin
      GUARDRAIL_AUTH_OIDC_CLIENT_ID: guardrail
      GUARDRAIL_AUTH_OIDC_CLIENT_NAME: Guardrail
      GUARDRAIL_AUTH_OIDC_CALLBACK_URL: https://guardrail.home.krandor.org:4433/auth/oidc/callback
      GUARDRAIL_AUTH_OIDC_LOGOUT_CALLBACK_URL: https://guardrail.home.krandor.org:4433/
      GUARDRAIL_AUTH_OIDC_LAUNCH_URL: https://guardrail.home.krandor.org:4433/
      POCKET_ID_OUTPUT_DIR: /bootstrap-output
    volumes:
      - ./guardrail-auth-setup.sh:/guardrail-auth-setup.sh:ro
      - ./_private/pocket-id:/bootstrap-output
    entrypoint:
      - /bin/sh
      - -c
      - apk add --no-cache curl jq >/dev/null && /bin/sh /guardrail-auth-setup.sh
    restart: 'no'

