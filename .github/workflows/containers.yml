name: Build, Push & Sign Multiarch Images

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GHCR: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.name }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            file: Containerfile.api
            arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            platform: linux/amd64

          - name: api
            file: Containerfile.api
            arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform: linux/arm64

          - name: web
            file: Containerfile.web
            arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            platform: linux/amd64

          - name: web
            file: Containerfile.web
            arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform: linux/arm64

          - name: ui
            file: Containerfile.ui
            arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            platform: linux/amd64

          - name: ui
            file: Containerfile.ui
            arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform: linux/arm64

          - name: processor
            file: Containerfile.processor
            arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            platform: linux/amd64

          - name: processor
            file: Containerfile.processor
            arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform: linux/arm64

          - name: curator
            file: Containerfile.curator
            arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            platform: linux/amd64

          - name: curator
            file: Containerfile.curator
            arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform: linux/arm64

          - name: ingestion
            file: Containerfile.ingestion
            arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            platform: linux/amd64

          - name: ingestion
            file: Containerfile.ingestion
            arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform: linux/arm64

          - name: schema-sync
            file: Containerfile.schema-sync
            arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            platform: linux/amd64

          - name: schema-sync
            file: Containerfile.schema-sync
            arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }} image (${{ matrix.arch }})
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg TARGET=${{ matrix.target }} \
            --file ${{ matrix.file }} \
            --cache-from type=gha,scope=${{ matrix.name }}-${{ matrix.arch }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.arch }} \
            --tag ${{ env.GHCR }}-${{ matrix.name }}:${{ matrix.arch }}-${{ github.sha }} \
            --push .

  create-and-sign-manifests:
    name: Create & Sign Multiarch Image Manifests
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
      packages: write
    needs: build
    strategy:
      matrix:
        name: [ api, web, ui, processor, curator, ingestion, schema-sync ]

    steps:
      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Check CoSign version
        run: cosign version

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest for ${{ matrix.name }}
        run: |
          IMAGE=${{ env.GHCR }}-${{ matrix.name }}
          SHA_TAG="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION_TAG="${GITHUB_REF_NAME}"
            docker buildx imagetools create \
              --tag ${IMAGE}:${VERSION_TAG} \
              --tag ${IMAGE}:${SHA_TAG} \
              --tag ${IMAGE}:latest \
              ${IMAGE}:amd64-${GITHUB_SHA} \
              ${IMAGE}:arm64-${GITHUB_SHA}
          else
            docker buildx imagetools create \
              --tag ${IMAGE}:${SHA_TAG} \
              --tag ${IMAGE}:latest \
              ${IMAGE}:amd64-${GITHUB_SHA} \
              ${IMAGE}:arm64-${GITHUB_SHA}
          fi

      - name: Sign multi-arch image for ${{ matrix.name }}
        run: |
          IMAGE=${{ env.GHCR }}-${{ matrix.name }}
          SHA_TAG="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            cosign sign --yes ${IMAGE}:${GITHUB_REF_NAME}
            cosign sign --yes ${IMAGE}:${SHA_TAG}
            cosign sign --yes ${IMAGE}:latest
          else
            cosign sign --yes ${IMAGE}:${SHA_TAG}
            cosign sign --yes ${IMAGE}:latest
          fi

      - name: Verify the images
        run: |
          set -o pipefail
          IMAGE=${{ env.GHCR }}-${{ matrix.name }}
          SHA_TAG="${GITHUB_SHA::7}"

          cosign verify ${IMAGE}:${SHA_TAG} \
              --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/containers.yml@refs/(heads/(main|dev)|tags/v.*)$" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com | jq

          cosign verify ${IMAGE}:latest \
              --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/containers.yml@refs/(heads/(main|dev)|tags/v.*)$" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com | jq

      - name: Generate and attach attestation
        run: |
          IMAGE=${{ env.GHCR }}-${{ matrix.name }}
          SHA_TAG="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            cosign attest \
              --yes \
              --predicate <(echo '{"buildType":"github-actions","builder":{"id":"https://github.com/${{ github.repository }}/.github/workflows/containers.yml@refs/tags/${{ github.ref_name }}"}}') \
              ${IMAGE}:${GITHUB_REF_NAME}
          fi

          cosign attest \
            --yes \
            --predicate <(echo '{"buildType":"github-actions","builder":{"id":"https://github.com/${{ github.repository }}/.github/workflows/containers.yml@refs/heads/${{ github.ref_name || github.ref_name }}"}}') \
            ${IMAGE}:${SHA_TAG}

          cosign attest \
            --yes \
            --predicate <(echo '{"buildType":"github-actions","builder":{"id":"https://github.com/${{ github.repository }}/.github/workflows/containers.yml@refs/heads/${{ github.ref_name || github.ref_name }}"}}') \
            ${IMAGE}:latest

  update-dev-infra:
    name: Update development images in workrave-infra
    runs-on: ubuntu-24.04
    needs: create-and-sign-manifests
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Trigger workrave-infra image update
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${INFRA_DISPATCH_TOKEN}" ]; then
            echo "ERROR: INFRA_DISPATCH_TOKEN is not set. Configure it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${INFRA_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/rcaelers/workrave-infra/dispatches \
            -d '{"event_type":"update-dev-images","client_payload":{"sha":"${{ github.sha }}","services":"api processor curator ingestion schema-sync web ui"}}'

  update-prod-infra:
    name: Update production images in workrave-infra
    runs-on: ubuntu-24.04
    needs: create-and-sign-manifests
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Trigger workrave-infra image update
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${INFRA_DISPATCH_TOKEN}" ]; then
            echo "ERROR: INFRA_DISPATCH_TOKEN is not set. Configure it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${INFRA_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/rcaelers/workrave-infra/dispatches \
            -d '{"event_type":"update-prod-images","client_payload":{"sha":"${{ github.sha }}","tag":"${{ github.ref_name }}","services":"api processor curator ingestion schema-sync web ui"}}'
