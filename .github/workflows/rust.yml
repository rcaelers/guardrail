name: Rust

on:
  push:
    branches: ['main', 'dev']
    tags:
      - 'v*.*.*'
  pull_request: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        run: |
          rustup toolchain install nightly
          rustup default nightly
          rustup target add wasm32-unknown-unknown
          rustup upgrade

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}
          cache-all-crates: 'true'

      - name: Install cargo-leptos
        run: cargo install --locked cargo-leptos

      - name: Build CSS
        run: |
          npm i
          npx @tailwindcss/cli -i ./src/web/server/static/input.css -o ./src/web/server/static/css/style.css

      # - name: Build web
      #   run: |
      #     export SQLX_OFFLINE=1
      #     cd src/web
      #     cargo leptos build -vv

      - name: Build backend
        run: |
          export SQLX_OFFLINE=1
          cargo build --workspace

  test:
    runs-on: ubuntu-24.04

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/guardrail

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        run: |
          rustup toolchain install nightly
          rustup default nightly
          rustup target add wasm32-unknown-unknown
          rustup upgrade

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-24.04
          cache-all-crates: 'true'

      - name: Install cargo-leptos
        run: cargo install --locked cargo-leptos

      - name: Install cargo-llvm-cov
        run: cargo install --locked cargo-llvm-cov

      - name: Run PostgreSQL container
        run: |
          docker run -d \
            --name postgresql \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_PORT=5432 \
            -p 5432:5432 \
            -v $GITHUB_WORKSPACE/dev/initdb/:/docker-entrypoint-initdb.d/ \
            --health-cmd "pg_isready -U postgres" \
            --health-interval 10s \
            --health-timeout 5s \
            --health-retries 5 \
            postgres:17

      - name: Wait for PostgreSQL to be ready
        run: |
          docker ps -a
          for i in {1..36}; do
            docker exec postgresql pg_isready && break
            sleep 5
          done

      - name: Run tests
        run: |
          export SQLX_OFFLINE=1
          RUST_BACKTRACE=1 cargo test -p api -p repos -p processor -p curator --no-fail-fast
