{% extends "base.html" %}

{% block content %}
<section class="panel narrow">
  <h1>Passkey Login</h1>
  <p>This page is server-rendered. The passkey form below is the first Svelte island.</p>

  <div
    id="passkey-login-island"
    data-next="{{ next }}"
    data-authenticated="{% if auth.is_authenticated() %}true{% else %}false{% endif %}"
  ></div>
  <script type="module" src="/static/assets/passkey-login.js"></script>
</section>
{% endblock %}
