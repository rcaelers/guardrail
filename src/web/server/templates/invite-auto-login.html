<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signing in · Guardrail</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: #fafaf9;
      color: #1c1917;
      margin: 0;
    }
    .container { text-align: center; padding: 1.5rem; max-width: 400px; width: 100%; }
    .logo { width: 26px; height: 26px; border-radius: 6px; background: #1c1917; margin: 0 auto 1.5rem; }
    h1 { font-size: 1.375rem; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 0.5rem; }
    p { font-size: 0.8125rem; color: #78716c; margin: 0; }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid #e5e7eb;
      border-top-color: #374151;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-top: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: #dc2626; font-size: 0.8125rem; margin: 1rem 0 0; }
    button {
      margin-top: 1rem;
      padding: 0.4rem 0.875rem;
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      background: #fff;
      cursor: pointer;
      font-size: 0.8125rem;
      color: #374151;
    }
    button:hover { background: #f9fafb; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"></div>

    <div id="pending">
      <h1>Signing in&hellip;</h1>
      <div class="spinner"></div>
    </div>

    <div id="success" class="hidden">
      <h1>Signed in</h1>
      <p>You can close this window and return to Guardrail.</p>
    </div>

    <div id="error" class="hidden">
      <h1>Sign-in failed</h1>
      <p class="error-msg" id="error-msg"></p>
      <button onclick="window.close()">Close window</button>
    </div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var token = params.get('token');
      var openerOrigin = params.get('origin');

      function show(id) {
        ['pending', 'success', 'error'].forEach(function (s) {
          document.getElementById(s).className = s === id ? '' : 'hidden';
        });
      }

      if (!token) {
        document.getElementById('error-msg').textContent = 'No token provided.';
        show('error');
        return;
      }

      fetch('/one-time-access-token/' + encodeURIComponent(token), {
        method: 'POST',
        credentials: 'include',
      }).then(function (resp) {
        if (!resp.ok) {
          return resp.text().then(function (text) {
            document.getElementById('error-msg').textContent =
              text || 'Sign-in failed (' + resp.status + ').';
            show('error');
          });
        }
        show('success');
        if (window.opener) {
          window.opener.postMessage({ type: 'setup-complete' }, openerOrigin || '*');
        }
        window.close();
      }).catch(function (err) {
        document.getElementById('error-msg').textContent = String(err);
        show('error');
      });
    })();
  </script>
</body>
</html>
