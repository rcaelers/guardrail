# Use mold for faster, lower-memory linking on Linux container builds.
# cfg condition keeps this from affecting macOS dev machines.
[target.'cfg(target_os = "linux")']
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[alias]
build-maxperf = "build --profile maxperf"
run-maxperf   = "run --profile maxperf"

# Coverage (line + branch summary) for the web server.
#
# Note: --branch (MC/DC instrumentation) triggers a segfault in llvm-cov's
# getInstantiationGroups on aarch64-apple-darwin when Rust generics are present.
# Line coverage + branch summary statistics are available without that flag.
#
# HTML report – open target/llvm-cov/html/index.html after running:
#   cargo cov-web
#
# LCOV report – for editors (Coverage Gutters) and CI:
#   cargo cov-web-lcov          → target/llvm-cov/web.lcov.info
#
# Test files (tests.rs) are excluded from the report; coverage is for
# production code only.
cov-web = "llvm-cov --profile coverage --package web --lib --html --output-dir target/llvm-cov/html --ignore-filename-regex '(^|/)tests\\.rs$'"
cov-web-lcov = "llvm-cov --profile coverage --package web --lib --lcov --output-path target/llvm-cov/web.lcov.info --ignore-filename-regex '(^|/)tests\\.rs$'"

# Tarpaulin coverage for the web server (line coverage; branch NOT implemented).
#
# Uses --engine llvm (required on macOS; ptrace engine is Linux-only).
# HTML report – open target/tarpaulin/html/index.html after running:
#   cargo tarp-web
#
# LCOV report – for editors (Coverage Gutters) and CI:
#   cargo tarp-web-lcov          → target/tarpaulin/web.lcov.info
tarp-web = "tarpaulin --packages web --lib --engine Llvm --output-dir target/tarpaulin --include-files src/web/server/src/* --exclude-files */bin/* --exclude-files */tests.rs --out Html"
tarp-web-lcov = "tarpaulin --packages web --lib --engine Llvm --output-dir target/tarpaulin --include-files src/web/server/src/* --exclude-files */bin/* --exclude-files */tests.rs --out Lcov"
